# configs/control_set.yaml
# Phase-1 validation controls.
# IMPORTANT: confirm/replace these accessions against literature before trusting AUROC.
# Positives: proteins with expected charge-rich, balanced (zwitterionic) surfaces.
#   Criteria: high density of both Lys/Arg AND Asp/Glu on solvent-exposed surface.
# Negatives: proteins with charge-poor or strongly charge-segregated surfaces.

positives:
  # Human serum albumin — very charge-dense, balanced acidic/basic residues, thermostable
  - P02768
  # Human lysozyme C — compact, charge-rich globular protein, thermostable
  - P61626
  # Human carbonic anhydrase 2 — stable enzyme, mixed surface charges
  - P00918
  # Ubiquitin — small, highly stable, surface charges well distributed
  - P0CG48
  # Human superoxide dismutase 1 — stable homodimer, balanced surface charges
  - P00441
  # Calmodulin — charge-rich Ca2+-binding protein
  - P0DP23

negatives:
  # Insulin — very small, minimal surface, charge-poor (mostly hydrophobic core)
  - P01308
  # Myoglobin — mostly hydrophobic exterior, few surface charges
  - P02144
  # Human prion protein — charge-poor N-terminal domain, known aggregation-prone
  - P04156
  # Glucagon — small peptide, minimal surface
  - P01275
  # Human amyloid beta — charge-poor, aggregation-prone, low stability
  - P05067
  # Alpha-synuclein — IDP, charge-segregated (acidic C-term, basic N-term)
  - P37840
